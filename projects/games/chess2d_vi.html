<noscript>
    <header><nav><a href="/index_vi.html">Tôn Minh</a> <a href="/projects_vi.html">Dự án</a> <a href="/services/game/index_vi.html">Dịch vụ Phát triển Game</a></nav></header><main><section><h1>Trò chơi Cờ Vua 2D</h1><p>3 tuần | Dự án một người | Hoàn thành<p>Thiết kế và phát triển hoàn chỉnh một game Cờ vua 2D bằng Java, sử dụng hệ thống hiển thị tùy chỉnh với AWT và Swing. Hệ thống hỗ trợ đầy đủ luật chơi như nhập thành, chiếu, chiếu hết, phong cấp quân tốt, cùng với vòng lặp lượt chơi theo lượt — tất cả đều được xây dựng từ đầu mà không sử dụng bất kỳ game engine bên ngoài nào. Giao diện người dùng trực quan đi kèm AI đối thủ cơ bản, hoạt động dựa trên tập hợp quy tắc quyết định được viết thủ công.</p><a href="https://github.com/Game2D-TM/ChessGame">Xem dự án Github</a> <a href="/services/game/index_vi.html">Liên hệ để phát triển game tương tự</a></section><section><h2>Tổng quan dự án</h2><p>Dự án này là một trò chơi Cờ vua 2D được lập trình thủ công hoàn toàn, phát triển trong năm thứ hai đại học nhằm khám phá các khái niệm lập trình cốt lõi.<p>Xây dựng hoàn toàn bằng Java thuần mà không sử dụng bất kỳ game engine nào, ứng dụng sử dụng Java AWT và Swing để hiển thị và tương tác với người dùng. Trò chơi hỗ trợ đầy đủ luật cờ vua — bao gồm nhập thành, chiếu, chiếu hết, phong cấp quân tốt — và có AI cơ bản dựa trên logic tự xây dựng.<p>Đây là bước tiến quan trọng giúp tôi hiểu sâu hơn về OOP, quản lý trạng thái game và xử lý tương tác người dùng trong ứng dụng desktop.</section><section><h2>Tính năng nổi bật</h2><ul><li>Vòng lặp game theo khung hình<li>Lập trình Java thuần<li>Hệ thống lượt chơi<li>Vẽ 2D thủ công<li>Tương tác chuột<li>Luật cờ vua đầy đủ<li>AI nhận biết tình huống<li>Bảo vệ tài sản mã hóa<li>Tự kiểm thử</ul></section><section><h2>Thách thức & Giải pháp</h2><h3>Thách thức: Tạo một vòng lặp game mượt mà và ổn định</h3><p>Tạo một vòng lặp game mượt mà và ổn định cho trò chơi 2D theo lượt mà không sử dụng bất kỳ game engine hay framework game tích hợp nào.<p><strong>Giải pháp:</strong> Xây dựng vòng lặp khung hình tùy chỉnh bằng System.nanoTime() để tính toán thời gian từng khung hình và điều chỉnh Thread.sleep() động nhằm duy trì tốc độ 144 FPS ổn định. Phân tách logic thành các phương thức tick() và render(), cho phép cập nhật, hiển thị và theo dõi FPS theo thời gian thực chỉ với các công cụ Java cơ bản.<h3>Thách thức: Tạo giao diện 2D phản hồi tốt</h3><p>Tạo giao diện 2D phản hồi tốt chỉ với Java AWT và Swing, không dựa vào các framework GUI/game hiện đại.<p><strong>Giải pháp:</strong> Tự vẽ toàn bộ đồ họa bằng Java2D và xử lý tương tác người dùng qua mouse listener cấp thấp, đảm bảo trải nghiệm mượt mà với phụ thuộc tối thiểu.<h3>Thách thức: Cài đặt đầy đủ luật cờ vua</h3><p>Cài đặt đầy đủ luật cờ vua, bao gồm các cơ chế phức tạp như nhập thành, chiếu hết, phong cấp quân tốt mà không dùng thư viện tham khảo hay game engine.<p><strong>Giải pháp:</strong> Xây dựng engine luật riêng bằng mảng 2D đại diện bàn cờ, kết hợp logic hướng đối tượng cho từng quân cờ để kiểm tra nước đi hợp lệ và áp dụng các quy tắc đặc biệt.<h3>Thách thức: Ngăn người dùng trích xuất tài sản</h3><p>Ngăn người dùng truy cập và trích xuất tài sản hình ảnh trực tiếp từ file game.<p><strong>Giải pháp:</strong> Mã hóa toàn bộ tài sản hình ảnh bằng Base64 và lưu vào file .dat, sau đó giải mã khi chạy chương trình, giúp việc lấy cắp tài sản trở nên khó khăn hơn nhiều.<h3>Thách thức: Xây dựng AI cờ vua</h3><p>Xây dựng AI cờ vua có hành vi hợp lý trong nhiều tình huống (tấn công, phòng thủ, phong cấp, nhập thành) mà không sử dụng kỹ thuật AI tiêu chuẩn hay thư viện hỗ trợ.<p><strong>Giải pháp:</strong> Áp dụng cây quyết định dựa trên điều kiện, kiểm tra nước ăn an toàn, khả năng phong cấp và các lựa chọn dự phòng. AI cũng đánh giá mức độ nguy hiểm trước khi xác nhận nước đi, mô phỏng tư duy cơ bản của người mới chơi.<h3>Thách thức: Duy trì trạng thái game và logic lượt chơi</h3><p>Duy trì trạng thái game và logic lượt chơi nhất quán xuyên suốt mọi nước đi và trường hợp đặc biệt.<p><strong>Giải pháp:</strong> Sử dụng mảng bàn cờ 2D tập trung và logic chuyển lượt rõ ràng để quản lý luồng người chơi, theo dõi vị trí quân cờ và cập nhật kết quả trận đấu chính xác.</section><section><h2>Điểm nhấn dự án</h2><p><strong>Vòng lặp game theo khung hình</strong>: Triển khai vòng lặp game tính theo khung hình, hướng tới 144 FPS bằng System.nanoTime(), với cập nhật, hiển thị và theo dõi FPS thời gian thực.<p><strong>Luật cờ vua tùy chỉnh</strong>: Áp dụng đầy đủ luật cờ vua như nhập thành, chiếu, chiếu hết, phong cấp quân tốt bằng logic kiểm tra nước đi tự viết.<p><strong>Giao diện AWT/Swing</strong>: Xây dựng giao diện 2D phản hồi tốt bằng Java AWT và Swing, quản lý hiển thị, chuột và phản hồi thời gian thực mà không dùng thư viện GUI ngoài.<p><strong>Hệ thống AI quyết định theo luật</strong>: Thiết kế AI mô phỏng tư duy chiến thuật: kiểm tra nước ăn, tránh nguy hiểm, nhập thành, phong cấp tốt. Không dùng thuật toán như Minimax mà dựa trên logic điều kiện tự xây dựng.<p><strong>Hệ thống giải mã tài sản runtime</strong>: Áp dụng cơ chế bảo vệ tài sản bằng cách mã hóa toàn bộ hình ảnh sang Base64, lưu file .dat và chỉ giải mã khi chạy, ngăn truy cập trực tiếp.<p><strong>Kiểm soát lượt & trạng thái game</strong>: Phát triển hệ thống lượt chắc chắn, xử lý luân phiên nước đi, kiểm tra luật, điều kiện thắng/thua và ngăn nước đi không hợp lệ.</section><section><h2>Thông tin dự án</h2><p>Thể loại: Ứng dụng trò chơi 2D<p>Vai trò: Nhà phát triển<p>Thời gian: 3 tuần<p>Quy mô: Dự án cá nhân<p>Công nghệ sử dụng: Java, Java AWT, Java Swing<p>Triển khai chính: Vòng lặp game tùy chỉnh, Engine bàn cờ 2D, Quân cờ hướng đối tượng, Hệ thống lượt chơi, AI dựa trên luật, Xử lý tài sản mã hóa, Giao diện AWT/Swing<p>Kiến trúc & Thiết kế: Thiết kế module OOP, Tách biệt chức năng, Hệ thống component tái sử dụng, Kế thừa & Kết hợp<p>Thống kê nhanh: Thời gian phát triển: 3 tuần, Loại: Game cờ vua 2D, Hệ thống: 20+, Người phát triển: 100% cá nhân, Đồ họa: Java2D tự vẽ, Engine: Không (Java thuần), Kiến trúc: OOP, Quy mô mã nguồn: Trung bình, Âm thanh: Không, Xử lý tài nguyên: Hình ảnh mã hóa</section><section><h2>Dự án liên quan</h2><p><a href="/games/bleed_game_vi.html">Bleed Game RPG</a>: Trò chơi Platformer 2D<p><a href="/games/similar_char.html">Trò chơi ghi nhớ ký tự Online</a>: Trò chơi Online</section><section><h2>Hình ảnh dự án</h2><ul><li><img alt="Ảnh menu cờ vua"src="/imgs/chess_game/chess_menu.webp"><li><img alt="Ảnh trong game cờ vua"src="/imgs/chess_game/ingame.webp"><li><img alt="Ảnh chọn nước cờ"src="/imgs/chess_game/play_game.webp"></ul></section></main><footer><h3>Tôn Thất Phu Nhật Minh</h3><nav><a href="/index_vi.html">Trang chủ</a> <a href="/index_vi.html#about">Giới thiệu</a> <a href="/index_vi.html#skills">Kĩ năng thực chiến</a> <a href="/projects_vi.html">Dự án</a> <a href="/index_vi.html#contacts">Thông tin liên hệ</a></nav><p>Email: <a href="mailto:contact@minhton.dev">contact@minhton.dev</a><p>Phone: <a href="https://zalo.me/0915682176">+84 915682176</a><p>Location: <a href="https://maps.app.goo.gl/DMbT3amH4Zozn8jY9">TP Hồ Chí Minh, Việt Nam</a><p>Social: <a href="https://www.youtube.com/@IkuraIsCoding">YouTube</a> | <a href="https://www.facebook.com/TTPNMinh/">Facebook</a> | <a href="https://github.com/IkMinhTon">GitHub</a> | <a href="https://www.tiktok.com/@ikuraiscoding">TikTok</a><p>© 17 Tháng 6, 2025 Tôn Minh – Bảo lưu mọi quyền.</footer>
