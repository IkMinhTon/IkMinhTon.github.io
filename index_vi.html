    <header><nav><a href="/index_vi.html">Tôn Minh</a> <a href="/services/web/index_vi.html">Xây dựng Website</a> <a href="#about">Giới thiệu</a> <a href="#skills">Kỹ năng</a> <a href="/projects_vi.html">Dự án</a> <a href="#contacts">Liên hệ</a></nav></header><section><h1>Tôn Minh - Lập trình viên Full-stack</h1><p>Tôi giải quyết vấn đề bằng code, tạo ra giải pháp táo bạo cho web, desktop, và game. Sẵn sàng nhận freelance tại TP.HCM.<p>Công nghệ: HTML5, CSS, JavaScript, React TS, Java (Spring, Servlet, JSP), ASP.NET C# (API, Razor Pages, MVC), C# Desktop (Winform, WPF, MAUL), Java Desktop (Javafx, Swing), Unity, Java Core, Vanilla JS, TCP/UDP/Sockets, SignalR, SQL, SQL Server, MySQL, PostgreSQL, SQLite, Triển khai VPS, Azure Cloud, Git, CI/CD, Cloudflare.<p>Thống kê: Hoàn thành hơn 40 dự án, 3+ năm kinh nghiệm lập trình, 100% khách hàng hài lòng.</p><a href="/projects_vi.html">Xem Dự Án</a> <a href="#contacts">Cùng Hợp Tác</a> <img alt="Tôn Minh - Lập trình viên Full-stack"src="/imgs/avatar.webp"></section><section><h2>Giới thiệu Tôn Minh</h2><p>Tôi là lập trình viên không chỉ viết code mà còn tạo ra sản phẩm tinh tế. Từ hệ thống thương mại điện tử, backend, đến game 2D/3D, tôi tập trung vào trải nghiệm người dùng, sáng tạo, và mã sạch.<p>Dịch vụ: Xây dựng website (hiện đại, responsive), phát triển game (2D/3D), phát triển ứng dụng desktop và công cụ, làm việc nhóm hiệu quả.<p>Hiện đang mở nhận freelance hoặc part-time về phát triển web, ứng dụng, hoặc game.</p><a href="/projects_vi.html">Xem Dự Án Web</a> <a href="/projects_vi.html">Xem Dự Án Game</a> <a href="/projects_vi.html">Xem Dự Án Desktop</a></section><section><h2>Kỹ Năng Thực Chiến</h2><p>Web: HTML5, CSS, JavaScript, React TS, Java (Spring, Servlet, JSP), ASP.NET C# (API, Razor Pages, MVC).<p>Desktop: C# (Winform, WPF, MAUL), Java (Javafx, Swing).<p>Game: Unity, Java Core, Vanilla JS.<p>Networking: TCP, UDP, Sockets, SignalR.<p>DevOps & Databases: SQL, SQL Server, MySQL, PostgreSQL, SQLite, Triển khai VPS, IIS, Azure Cloud, Git, CI/CD, Cloudflare (SSL, CDN, DNS).</section><section><h2>Dự Án</h2><p>Khám phá các sản phẩm của tôi qua nhiều công nghệ và lĩnh vực.<ul><li><img alt="Dự án Blog Cá Nhân"src="/imgs/personal_blog/homepage_black(1).webp"><li><img alt="Dự án Diễn Đàn Ẩm Thực"src="/imgs/food_forum/recipe-detail.webp"><li><img alt="Dự án Cửa Hàng Phụ Kiện"src="/imgs/accessories_store/homepage.webp"><li><img alt="Dự án Marketplace Robux"src="/imgs/robux_marketplace/balance.webp"><li><img alt="Dự án Marketplace Facebook"src="/imgs/fb_marketplace/homepage(1).webp"><li><img alt="Dự án Quản Lý Phòng Lab"src="/imgs/labroom_management/edit-schedule.webp"><li><img alt="Dự án Homepage BDO"src="/imgs/bdo_homepage/map(1).webp"></ul><a href="/projects_vi.html">Xem Tất Cả Dự Án</a></section><section><h2>Đánh Giá Từ Khách Hàng</h2><ul><li><p>“Legit x1000, chạy siêu tốc!!”<p>Trí Đức Nguyễn (đánh giá ở Facebook)</p><img alt="Đánh giá khách hàng về dịch vụ lập trình của Tôn Minh"src="/imgs/clients/1.png"><li><p>“Anh uy tín và nhiệt tình.”<p>Thành Trần Minh (đánh giá ở Facebook)</p><img alt="Đánh giá khách hàng về dịch vụ website của Tôn Minh"src="/imgs/clients/2.png"><li><p>“Bạn này uy tín chất lượng nha.”<p>Bùi Thị Ngọc An (đánh giá ở Facebook)</p><img alt="Đánh giá khách hàng về dự án của Tôn Minh"src="/imgs/clients/3.png"><li><p>“Anh này uy tín, nhiệt tình lắm nhe.”<p>Hi Hi (đánh giá ở Facebook)</p><img alt="Đánh giá khách hàng về freelance của Tôn Minh"src="/imgs/clients/4.png"><li><p>“A uy tín, nhiệt tình.”<p>Phạm Xuân Hiệu (đánh giá ở Facebook)</p><img alt="Đánh giá khách hàng về lập trình viên Tôn Minh"src="/imgs/clients/5.png"></ul></section><section><h2>Kết Nối Với Tôi</h2><p>Liên hệ qua mạng xã hội để trao đổi hoặc hợp tác.</p><a href="https://www.youtube.com/@IkuraIsCoding">YouTube</a> <a href="https://www.facebook.com/TTPNMinh/">Facebook</a> <a href="https://github.com/IkMinhTon">GitHub</a> <a href="https://www.tiktok.com/@ikuraiscoding">TikTok</a> <a href="https://zalo
