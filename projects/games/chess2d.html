    <header><nav><a href="/index.html">Minh Ton</a> <a href="/projects.html">Projects</a> <a href="/services/game/index.html">Game Development Services</a></nav></header><main><section><h1>Chess 2D Game</h1><p>3 weeks | Solo Project | Completed<p>Designed and built a complete 2D Chess game in Java, featuring a custom rendering system using AWT and Swing, full rule implementation (castling, check, checkmate, pawn promotion), and a turn-based game loop — all without any external game engine. Includes an intuitive player interface and a basic AI opponent driven by handcrafted decision rules.</p><a href="https://github.com/Game2D-TM/ChessGame">View Github</a> <a href="/services/game/index.html">Contact to build a similar game</a></section><section><h2>Project Overview</h2><p>This project is a fully handcrafted 2D Chess game developed during my second year of university as a way to explore core programming concepts.<p>Built entirely in pure Java without any game engine, it uses Java AWT and Swing for rendering and user interaction. The game supports complete chess rules—including castling, check, checkmate, and pawn promotion—and features a simple AI opponent based on self-defined move evaluation logic.<p>It was an important step in my journey to understanding OOP, game state management, and user input handling in desktop applications.</section><section><h2>Key Features</h2><ul><li>Frame-Based Game Loop<li>Built with Pure Java<li>Turn-Based System<li>Manual 2D Rendering<li>Mouse Interaction<li>Complete Chess Logic<li>AI with Situational Awareness<li>Encoded Asset Protection<li>Self-Tested</ul></section><section><h2>Challenges & Solutions</h2><h3>Challenge: Creating a smooth and consistent game loop</h3><p>Creating a smooth and consistent game loop for a turn-based 2D game without using any game engine or built-in game framework.<p><strong>Solution:</strong> Built a custom frame-based loop using System.nanoTime() to calculate frame timing and dynamically adjust Thread.sleep() to maintain a stable 144 FPS. Separated logic into tick() and render() methods, allowing real-time updates, rendering, and frame tracking using minimal Java tools.<h3>Challenge: Creating a responsive 2D interface</h3><p>Creating a responsive 2D interface using only Java AWT and Swing, without relying on any modern GUI/game frameworks.<p><strong>Solution:</strong> Manually rendered all graphics using Java2D and handled user input through low-level mouse listeners, achieving smooth interactivity with minimal dependencies.<h3>Challenge: Implementing full chess rules</h3><p>Implementing full chess rules, including complex mechanics like castling, checkmate, and pawn promotion, without using a game engine or reference libraries.<p><strong>Solution:</strong> Built a custom rule engine using a 2D array to represent the board, combined with object-oriented logic for each piece to validate legal moves and enforce special rules.<h3>Challenge: Preventing asset extraction</h3><p>Preventing users from accessing and extracting image assets directly from the game files.<p><strong>Solution:</strong> Encoded all image assets using Base64 and stored them in .dat files, then decoded them at runtime, making asset scraping significantly harder.<h3>Challenge: Creating a chess AI</h3><p>Creating a chess AI that behaves logically under various scenarios (attack, defense, promotion, castling) without any help from standard AI techniques or libraries.<p><strong>Solution:</strong> Implemented a condition-based decision tree that checks for safe kill moves, possible promotions, and fallback options. The AI also evaluates threat levels before confirming a move, making decisions that resemble beginner-level human reasoning.<h3>Challenge: Maintaining game state and turn logic</h3><p>Maintaining game state and turn logic consistently across all moves and special cases.<p><strong>Solution:</strong> Used a centralized 2D board array and clearly defined turn-switching logic to manage player flow, track piece positions, and update game outcomes accurately.</section><section><h2>Project Highlights</h2><p><strong>Frame-Based Game Loop</strong>: Implemented a frame-timed game loop targeting 144 FPS using System.nanoTime(), with real-time rendering, game updates, and FPS tracking.<p><strong>Custom Chess Logic</strong>: Implemented full chess rules including castling, check, checkmate, and pawn promotion using manually written movement validation logic.<p><strong>AWT/Swing-Based GUI</strong>: Built a responsive 2D interface using Java AWT and Swing, managing rendering, mouse input, and real-time feedback without any GUI libraries.<p><strong>Rule-Based AI Decision System</strong>: Designed an AI that simulates strategic decision-making by checking kill potential, avoiding threats, performing castling, and promoting pawns. It mimics basic human playstyle without algorithms like Minimax.<p><strong>Runtime Asset Decoding System</strong>: Implemented a custom asset protection mechanism by encoding all image assets in Base64, storing them in .dat files, and decoding only during runtime to prevent direct access.<p><strong>Turn-based & Game State Control</strong>: Developed a robust turn system handling alternating moves, rule enforcement, win/loss conditions, and invalid move prevention.</section><section><h2>Project Info</h2><p>Category: Game 2D Application<p>My Role: Game Developer<p>Duration: 3 weeks<p>Team Size: Solo Project<p>Technologies: Java, Java AWT, Java Swing<p>Core Implementations: Custom Game Loop, 2D Chessboard Engine, Object-Oriented Chess Pieces, Turn-Based Game System, Rule-Based AI System, Encoded Asset Handling, AWT/Swing UI<p>Architecture & Design: OOP Modular Design, Separation of Concerns, Reusable Component System, Inheritance & Composition<p>Quick Stats: Dev Time: 3 weeks, Type: 2D Chess Game, Systems: 20+, Built By: 100% Solo, Graphics: Custom Java2D, Engine: None (Pure Java), Architecture: OOP-based, Codebase: Medium-scale, Audio: No, Asset Handling: Encoded Image</section><section><h2>Related Projects</h2><p><a href="/games/bleed_game.html">Bleed Game RPG</a>: Game Platformer 2D<p><a href="/games/similar_char.html">Similar Characters Online Game</a>: Online Game</section><section><h2>Project Images</h2><ul><li><img alt="Screenshot Chess Menu"src="/imgs/chess_game/chess_menu.webp"><li><img alt="Screenshot ingame Chess"src="/imgs/chess_game/ingame.webp"><li><img alt="Screenshot choose piece to move"src="/imgs/chess_game/play_game.webp"></ul></section></main><footer><h3>Tôn Thất Phu Nhật Minh</h3><nav><a href="/index.html">Home</a> <a href="/index.html#about">About</a> <a href="/index.html#skills">Skills</a> <a href="/projects.html">Projects</a> <a href="/index.html#contacts">Contacts</a></nav><p>Email: <a href="mailto:contact@minhton.dev">contact@minhton.dev</a><p>Phone: <a href="https://zalo.me/0915682176">+84 915682176</a><p>Location: <a href="https://maps.app.goo.gl/DMbT3amH4Zozn8jY9">Ho Chi Minh City, Việt Nam</a><p>Social: <a href="https://www.youtube.com/@IkuraIsCoding">YouTube</a> | <a href="https://www.facebook.com/TTPNMinh/">Facebook</a> | <a href="https://github.com/IkMinhTon">GitHub</a> | <a href="https://www.tiktok.com/@ikuraiscoding">TikTok</a><p>© June 17, 2025 Minh Ton – All Rights Reserved.</footer>
