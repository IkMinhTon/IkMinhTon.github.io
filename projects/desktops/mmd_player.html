    <header><nav><a href="/index.html">Minh Ton</a> <a href="/projects.html">Projects</a> <a href="/services/desktop/index.html">Desktop App Development Services</a></nav></header><main><section><h1>MMDPlayer (Media Player App)</h1><p>2–4 weeks | Solo Project | Completed<p>Built a lightweight desktop media player in WinForms C#, integrating AxWMPLib (Windows Media Player ActiveX) to deliver smooth, reliable video and audio playback with a native Windows UI experience.</p><a href="https://github.com/IkMinhTon/MyWindowMedia">View Github</a> <a href="/services/desktop/index.html">Contact to build a similar app</a></section><section><h2>Project Overview</h2><p>This project is one of my first solo projects, developed during my first year of study at school. Its a multimedia application built entirely from scratch using C# and AxWMPLib (Windows Media Player ActiveX). Designed as a lightweight yet powerful media solution, build responsive Windows desktop applications with essential playback features and user-friendly interfaces.<p>This media player allows users to play music and videos, organize content through custom playlists, and control playback with features like pause/resume, shuffle mode, and loop. A key highlight of the app is its robust playlist management system, which supports multiple playlists stored in a centralized library, each capable of containing both audio and video files.<p>This project reflects my understanding of desktop UI/UX principles, C# event-driven programming, and ActiveX integration, making it a strong showcase of both technical skill and software design capability.</section><section><h2>Key Features</h2><ul><li>Play Music & Videos<li>Playback Controls<li>Playlist Management<li>Import Playlists & Playlist Library<li>User-Friendly Interface</ul></section><section><h2>Challenges & Solutions</h2><h3>Challenge: Complex audio/video handling</h3><p>Building a media player from scratch requires complex handling of audio/video decoding and rendering.<p><strong>Solution:</strong> Integrated AxWMPLib (ActiveX Windows Media Player) to handle playback and control functions like play, pause, loop, and shuffle—saving development time while ensuring compatibility and stability.<h3>Challenge: Playlist management</h3><p>Designing a system where each playlist could store both audio and video, while allowing users to view, edit, and manage them intuitively.<p><strong>Solution:</strong> Built a custom playlist management system that supports multiple playlists, with the ability to rename, browse media items, and manage media types seamlessly within each list.<h3>Challenge: Multi-format import</h3><p>Users have different file types (.mp3, .mp4, .wav, etc.) and need a smooth import experience.<p><strong>Solution:</strong> Implemented a custom OpenFileDialog filter allowing multiple file extensions to be selected at once, supporting popular formats and improving user convenience.<h3>Challenge: UI thread freezing</h3><p>WinForms runs on a single UI thread, and without careful handling, it can freeze during file operations.<p><strong>Solution:</strong> Kept operations lightweight and UI interactions optimized, ensuring the app stays responsive under typical use cases. (Planned for async/threading improvements in the future.)</section><section><h2>Project Highlights</h2><p><strong>Audio & Video Playback Support</strong>: Seamlessly plays both music and video files with support for pause, resume, shuffle (random), and loop functionalities.<p><strong>Multi-Format Support</strong>: Allows importing and playing various file types: .mp3, .mp4, .wav, .webm, .weba, .wma, .mpa.<p><strong>Advanced Playlist Management</strong>: Users can create, edit, rename, and delete multiple playlists stored in a centralized library—each playlist supports both songs and videos.<p><strong>Import External Playlists</strong>: Supports importing local playlists, allowing quick setup and personalized media organization.<p><strong>User Friendly Interface</strong>: Clean and intuitive UI designed for easy navigation and media control—suitable for both beginners and experienced users.<p><strong>ActiveX Integration (AxWMPLib)</strong>: Integrated the Windows Media Player ActiveX component for reliable and high-quality playback with minimal system overhead.</section><section><h2>Project Info</h2><p>Category: Desktop Application<p>My Role: Developer<p>Duration: 2–4 weeks<p>Team Size: Solo Project<p>Technologies: C#, Winform, AxWMPLib<p>Quick Stats: Dev Time: 2–4 weeks, Supports: .mp3, .mp4, .wav, etc., Platform: Windows Desktop, Playlists: Audio & Video Support, UI: Custom, Project Size: Lightweight</section><section><h2>Project Images</h2><ul><li><img alt="Screenshot video play"src="/imgs/mmd_player/video_view.webp"><li><img alt="Screenshot song play"src="/imgs/mmd_player/mmdplayer_ui.webp"><li><img alt="Screenshot song play 2"src="/imgs/mmd_player/mmdplayer_ui(1).webp"><li><img alt="Screenshot playlist media"src="/imgs/mmd_player/playlist.webp"><li><img alt="Screenshot playlist media 2"src="/imgs/mmd_player/playlist(1).webp"><li><img alt="Screenshot playlist update"src="/imgs/mmd_player/playlist_update.webp"><li><img alt="Screenshot history played media"src="/imgs/mmd_player/history.webp"><li><img alt="Screenshot library playlist media"src="/imgs/mmd_player/library.webp"></ul></section></main><footer><h3>Tôn Thất Phu Nhật Minh</h3><nav><a href="/index.html">Home</a> <a href="/index.html#about">About</a> <a href="/index.html#skills">Skills</a> <a href="/projects.html">Projects</a> <a href="/index.html#contacts">Contacts</a></nav><p>Email: <a href="mailto:contact@minhton.dev">contact@minhton.dev</a><p>Phone: <a href="https://zalo.me/0915682176">+84 915682176</a><p>Location: <a href="https://maps.app.goo.gl/DMbT3amH4Zozn8jY9">Ho Chi Minh City, Việt Nam</a><p>Social: <a href="https://www.youtube.com/@IkuraIsCoding">YouTube</a> | <a href="https://www.facebook.com/TTPNMinh/">Facebook</a> | <a href="https://github.com/IkMinhTon
