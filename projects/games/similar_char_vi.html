<noscript>
    <header><nav><a href="/index_vi.html">Tôn Minh</a> <a href="/projects_vi.html">Dự án</a> <a href="/services/game/index_vi.html">Dịch vụ Phát triển Game</a></nav></header><main><section><h1>Trò chơi đoán chữ Online</h1><p>1 tháng | Dự án một người | Hoàn thành<p>Trò chơi trực tuyến nhiều người chơi với hệ thống phòng, bảng xếp hạng, chế độ đấu tay đôi và chat realtime. Xây dựng game socket realtime, quản lý dữ liệu người chơi, xử lý logic tính điểm nhiều vòng và tối ưu trải nghiệm tương tác trực tuyến.</p><a href="/services/game/index_vi.html">Liên hệ để phát triển game tương tự</a></section><section><h2>Tổng quan dự án</h2><p>Đây là dự án tôi thiết kế và triển khai một trò chơi nhiều người chơi hai người thời gian thực sử dụng giao tiếp socket. Hệ thống hỗ trợ tạo phòng, ghép trận, chat thời gian thực, xác thực người chơi, xếp hạng và quản lý bạn bè, mang lại trải nghiệm chơi mượt mà và tương tác.<p>Chế độ đấu tay đôi có logic nhiều vòng, lượt chơi giới hạn thời gian, tích điểm và các quy tắc công bằng (bao gồm đề nghị hòa và xử lý hết giờ). Những tính năng này thể hiện khả năng xây dựng cơ chế game có cấu trúc và đảm bảo đồng bộ hóa giữa hai đối thủ trong thời gian thực.<p>Ngoài ra, tôi đã triển khai lưu trữ thông tin và thống kê người chơi lâu dài, cùng với cập nhật tức thì cho chat và bảng xếp hạng. Điều này đòi hỏi xử lý cẩn thận trạng thái game, sự kiện mạng và tính nhất quán của cơ sở dữ liệu.<p>Khi tự mình phát triển toàn bộ dự án, tôi đã có kinh nghiệm thực tế về lập trình socket (TCP), đồng bộ trạng thái và logic server đa luồng. Trọng tâm là xây dựng chức năng thời gian thực ổn định và đảm bảo luồng chơi mượt mà, thể hiện chuyên môn kỹ thuật của tôi trong phát triển hệ thống tương tác.</section><section><h2>Tính năng chính</h2><ul><li>Hệ thống phòng<li>Chế độ đấu tay đôi thời gian thực (2 người chơi)<li>Gameplay thử thách ghi nhớ<li>Hệ thống tính điểm<li>Cơ chế hòa<li>Lưu trữ dữ liệu người chơi<li>Bảng xếp hạng<li>Chat & tương tác bạn bè thời gian thực<li>Đăng nhập/Đăng xuất & Quản lý tài khoản</ul></section><section><h2>Thách thức & Giải pháp</h2><h3>Thách thức: Đồng bộ thời gian thực</h3><p>Đồng bộ chuỗi kí tự và phản hồi của người chơi theo thời gian thực để đảm bảo cả hai đối thủ đều thấy cùng một chuỗi và kết quả nhất quán qua socket.<p><strong>Giải pháp:</strong> Áp dụng thiết kế server kiểm soát, nơi server tạo chuỗi, phát cho cả hai và xác thực đầu vào của người chơi. Điều này ngăn lệch trạng thái và đảm bảo tính điểm công bằng bằng cách xử lý kết quả tập trung ở server trước khi gửi lại cho client.<h3>Thách thức: Hệ thống tính điểm</h3>率先<p>Thiết kế hệ thống tính điểm xử lý khớp một phần, thưởng chuỗi đúng liên tiếp và đàm phán hòa, đồng thời giữ quy tắc công bằng, minh bạch.<p><strong>Giải pháp:</strong> Xây dựng module tính điểm linh hoạt, kiểm tra kí tự liên tiếp, thưởng điểm theo độ dài khớp, theo dõi số lần sai liên tiếp để buộc hòa, tích hợp đề nghị hòa với xác nhận từ cả hai người chơi.<h3>Thách thức: Quản lý thời gian</h3><p>Quản lý bộ đếm thời gian lượt chơi và đảm bảo người chơi không lợi dụng trì hoãn hoặc hết giờ trong trận đấu.<p><strong>Giải pháp:</strong> Phát triển bộ đếm thời gian phía server với giới hạn nghiêm ngặt: 10s ghi nhớ, 60s nhập lại. Phản hồi trễ hoặc thiếu sẽ tự động tính thua hoặc hòa, được kiểm soát bởi logic server để loại bỏ gian lận phía client.<h3>Thách thức: Hệ thống phòng</h3><p>Triển khai hệ thống phòng tin cậy để đảm bảo ghép trận đúng và tách biệt luồng dữ liệu giữa các trận đấu khác nhau.<p><strong>Giải pháp:</strong> Xây dựng sảnh socket nơi người chơi có thể tạo hoặc tham gia phòng. Mỗi phòng có mã riêng và trạng thái độc lập, đảm bảo chỉ hai người chơi được ghép, quản lý phiên chuẩn tránh rò rỉ dữ liệu giữa các phòng.<h3>Thách thức: Phản hồi giao diện</h3><p>Giữ giao diện tối giản nhưng phản hồi nhanh, cung cấp kết quả tức thì sau khi mỗi vòng mà không gây rối mắt cho người chơi.<p><strong>Giải pháp:</strong> Triển khai giao diện Swing đơn giản với UI động. Kết quả từng vòng hiển thị ngay lập tức, khu vực chuỗi tự động làm mới cho thử thách tiếp theo.</section><section><h2>Điểm nổi bật</h2><p><strong>Chế độ đấu tay đôi thời gian thực</strong>: Xây dựng hệ thống đấu hai người đồng bộ, nơi lượt chơi, kết quả và bộ đếm thời gian được cập nhật tức thì qua giao tiếp TCP socket tự xây dựng.<p><strong>Hệ thống Phòng tùy chỉnh</strong>: Triển khai sảnh socket cho phép người chơi tạo, tham gia hoặc ghép nhanh vào phòng, làm nền tảng cho các trận đấu thời gian thực.<p><strong>Hệ thống tính điểm dựa trên ghi nhớ</strong>: Xây dựng logic game cốt lõi tạo chuỗi, kiểm tra đáp án, theo dõi chuỗi đúng liên tiếp và tính điểm động qua 10 vòng đấu cạnh tranh.<p><strong>Cơ chế đàm phán hòa</strong>: Thiết kế hệ thống đề nghị hòa chiến lược, nơi người chơi có thể yêu cầu và chấp nhận hòa, tăng chiều sâu chiến thuật và quyết định dưới áp lực.<p><strong>Lưu trữ dữ liệu người chơi bền vững</strong>: Phát triển lưu trữ và theo dõi lịch sử trận đấu, điểm số và thống kê thành tích, hỗ trợ tiến trình lâu dài và công bằng.<p><strong>Hệ thống vòng đấu giới hạn thời gian</strong>: Thêm bộ đếm thời gian cho giai đoạn ghi nhớ và nhập liệu, đảm bảo nhịp độ cân bằng và thử thách thực sự trong mỗi trận đấu.</section><section><h2>Thông tin dự án</h2><p>Thể loại: Ứng dụng Game 2D<p>Vai trò: Lập trình viên<p>Thời gian: 1 tháng<p>Quy mô nhóm: Cá nhân<p>Công nghệ sử dụng: Java Swing, Realtime (TCP Socket), MySql<p>Triển khai chính: Giao tiếp Socket thời gian thực, Hệ thống phòng & Ghép trận, Logic game ghi nhớ, Điểm số & Điều khiển trận đấu, Quản lý dữ liệu người chơi, Bảng xếp hạng & Hệ thống điểm, Hệ thống tài khoản, Chat & Tính năng xã hội thời gian thực, Giao diện đơn giản cho chơi game<p>Luật chơi:<ul><li><strong>Giai đoạn Ghi nhớ</strong>: Máy chủ hiển thị chuỗi kí tự trong 10 giây. Sau 5 giây, một chuỗi mới sẽ được chuẩn bị cho vòng tiếp theo.<li><strong>Giai đoạn Nhập liệu</strong>: Mỗi người chơi có 60 giây để nhập lại chuỗi đã ghi nhớ. Hệ thống kiểm tra số kí tự đúng liên tiếp từ đầu chuỗi.<li><strong>Tính điểm</strong>: Điểm được tính dựa trên số kí tự đúng và độ khó (độ dài chuỗi). Nếu cả hai đều đoán sai 5 vòng liên tiếp, trận đấu hòa (mỗi người nhận 0.5 điểm).<li><strong>Đàm phán hòa</strong>: Một người chơi có thể đề nghị hòa trong vòng đấu. Nếu đối thủ đồng ý, vòng hiện tại sẽ bị bỏ qua và không ai được điểm.<li><strong>Kết thúc trận</strong>: Mỗi trận gồm 10 vòng. Người có điểm cao hơn sẽ thắng. Nếu hòa, cả hai có thể bắt đầu trận mới. Hoàn thành đủ 10 vòng sẽ cộng 1 điểm trận vào thành tích.</ul><p>Thống kê nhanh: Thời gian: 1 tháng, Loại: Game Ghi nhớ online, Người chơi: 2 (thời gian thực), Kết nối mạng: TCP Socket, Số vòng: 10 mỗi trận, Tính năng: 10+ Hệ thống chính, Người phát triển: 100% Cá nhân</section><section><h2>Dự án liên quan</h2><p><a href="/games/bleed_game_vi.html">Bleed Game RPG</a>: Trò chơi Platformer 2D<p><a href="/games/chess2d_vi.html">Cờ vua 2D</a>: Trò chơi 2D</section><section><h2>Hình ảnh dự án</h2><ul><li><img alt="Ảnh chụp màn hình chơi game với người khác"src="/imgs/similar_characters/play-game.webp"><li><img alt="Ảnh chụp màn hình đăng nhập"src="/imgs/similar_characters/login-form.webp"><li><img alt="Ảnh chụp màn hình giao diện trong game"src="/imgs/similar_characters/ingame.webp"><li><img alt="Ảnh chụp màn hình tạo phòng"src="/imgs/similar_characters/create-room.webp"><li><img alt="Ảnh chụp màn hình tham gia phòng"src="/imgs/similar_characters/join-room.webp"><li><img alt="Ảnh chụp màn hình ghép phòng nhanh"src="/imgs/similar_characters/fast-join-room.webp"><li><img alt="Ảnh chụp màn hình danh sách bạn bè"src="/imgs/similar_characters/friend-list.webp"><li><img alt="Ảnh chụp màn hình đấu bạn bè"src="/imgs/similar_characters/duel-friend.webp"></ul></section></main><footer><h3>Tôn Thất Phu Nhật Minh</h3><nav><a href="/index_vi.html">Trang chủ</a> <a href="/index_vi.html#about">Giới thiệu</a> <a href="/index_vi.html#skills">Kĩ năng thực chiến</a> <a href="/projects_vi.html">Dự án
