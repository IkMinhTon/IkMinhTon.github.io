<noscript>
    <header><nav><a href="/index_vi.html">Tôn Minh</a> <a href="/projects_vi.html">Dự án</a> <a href="/services/web/index_vi.html">Dịch vụ Xây dựng Website</a></nav></header><main><section><h1>Website Chợ bán Robux</h1><p>Hơn 1 năm | Dự án một người | Dự án dài hạn<p>Nền tảng web đầy đủ tính năng cho việc mua, bán và quản lý giao dịch Robux. Hệ thống hỗ trợ đa ngôn ngữ, tích hợp chat thời gian thực, ví bảo mật với nhiều phương thức thanh toán. Đảm bảo bảo vệ khách hàng qua bảo hành tự động, xử lý hoàn tiền, và theo dõi giao dịch chi tiết.</p><a href="/services/web/index_vi.html">Liên hệ để xây website tương tự</a></section><section><h2>Tổng quan dự án</h2><p>Dự án này thể hiện khả năng thiết kế, xây dựng và duy trì một hệ thống web full-stack phức tạp cho giao dịch Robux trực tuyến. Bao gồm toàn bộ chu trình phát triển: xác thực, giao dịch an toàn, chat thời gian thực, quản lý ví, và phân quyền truy cập đa vai trò.<p>Không chỉ lập trình, dự án còn mô phỏng nền tảng thương mại điện tử thực tế với các tính năng như hỗ trợ đa ngôn ngữ, quản lý đại lý và hoa hồng, thông báo tự động (email & Telegram), và hệ thống bảo vệ người mua với bảo hành, hoàn tiền tự động.<p>Giá trị của dự án còn ở chỗ tôi trực tiếp tương tác với người dùng, khách hàng trong thời gian dài để giải quyết vấn đề, thu thập phản hồi và liên tục cải tiến sản phẩm. Trải nghiệm này phản ánh thách thức thực tế khi vận hành hệ thống sống, đảm bảo hài lòng khách hàng và phát triển nền tảng theo nhu cầu.<p>Làm việc một mình với dự án dài hạn giúp tôi có kinh nghiệm thực tế về thiết kế kiến trúc hệ thống, quản lý cơ sở dữ liệu mở rộng, phát triển front-end, back-end và chiến lược triển khai. Điều này thể hiện không chỉ chuyên môn kỹ thuật mà còn khả năng quản lý sản phẩm, xử lý thách thức phức tạp và xây dựng giải pháp chuyên nghiệp từ đầu.</section><section><h2>Tính năng nổi bật</h2><ul><li>Xác thực và phân quyền người dùng<li>Đăng nhập nhanh bằng Google<li>Hỗ trợ đa ngôn ngữ<li>Mua Robux tức thì, đặt trước hoặc mua số lượng nhỏ<li>Quản lý ví cá nhân với hỗ trợ nhiều loại tiền tệ (VND, USD)<li>Nạp tiền online an toàn qua QR ngân hàng<li>Theo dõi đơn hàng/giao dịch, xem lịch sử và báo cáo chi tiết<li>Chat thời gian thực giữa người dùng, đại lý, quản trị viên<li>Quản lý đại lý<li>Hệ thống rút tiền cho đại lý<li>Bảo hành và hoàn tiền tự động cho đơn lỗi<li>Công cụ quản trị: duyệt đơn, kiểm tra đại lý, điều chỉnh số dư<li>Thông báo tự động qua web, email, Telegram<li>Quản lý dữ liệu và hồ sơ người dùng<li>Hiệu năng mở rộng, kiểm thử với 1500+ người dùng<li>Tích hợp Cloudflare chống DDoS và tăng bảo mật<li>Thiết kế responsive trên desktop, tablet, mobile</ul></section><section><h2>Thách thức & Giải pháp</h2><h3>Thách thức: Xác thực & Phân quyền</h3><p>Đảm bảo an toàn tài khoản và phân quyền rõ ràng cho người dùng, đại lý, quản trị viên.<p><strong>Giải pháp:</strong> Áp dụng JWT với refresh token, phân quyền vai trò, và tùy chọn 2FA tăng bảo mật.<h3>Thách thức: Đa ngôn ngữ</h3><p>Người dùng từ nhiều khu vực cần trải nghiệm bản địa hóa.<p><strong>Giải pháp:</strong> Xây dựng hệ thống ngôn ngữ cho phép thêm và quản lý bản dịch dễ dàng.<h3>Thách thức: Hệ thống đơn hàng linh hoạt (Mua ngay, Đặt trước, Mua lẻ)</h3><p>Xử lý ba luồng mua khác nhau mà không xung đột giao dịch.<p><strong>Giải pháp:</strong> Thiết kế hệ thống đơn hàng linh hoạt với nhánh logic riêng và xếp hàng để tránh bán trùng.<h3>Thách thức: Ngăn đơn trùng lặp</h3><p>Khi nhiều người mua cùng lúc, dễ xảy ra bán trùng tài khoản – vấn đề đồng thời phổ biến ở chợ số.<p><strong>Giải pháp: Thiết kế Một tài khoản - Một đơn</strong> Mỗi đơn ứng với một tài khoản Roblox. Khi mua xong, tài khoản bị khóa và đánh dấu “đã bán”, không ai khác mua được.<h3>Thách thức: Theo dõi đơn hàng & Lịch sử</h3><p>Người dùng cần xem tiến trình đơn hàng theo thời gian thực.<p><strong>Giải pháp:</strong> Xây dựng hệ thống theo dõi đơn với cập nhật trạng thái chi tiết và lịch sử giao dịch tìm kiếm được.<h3>Thách thức: Ví cá nhân đa tiền tệ</h3><p>Hỗ trợ nhiều loại tiền (VND, USD) mà vẫn đảm bảo số dư chính xác.<p><strong>Giải pháp:</strong> Tạo ví cá nhân riêng cho từng người, áp dụng tỷ giá chuẩn do Admin đặt, ghi log mọi giao dịch chi tiết.<h3>Thách thức: Đảm bảo nhất quán số dư ví</h3><p>Cập nhật số dư liên tục cho nhiều người cùng lúc dễ gây lỗi đồng thời hoặc sai số dư nếu không kiểm soát tốt.<p><strong>Giải pháp:</strong> Áp dụng hệ thống giao dịch tự động với kiểm soát đồng thời nghiêm ngặt, mỗi giao dịch được log, xác thực và đồng bộ, đảm bảo số dư ví luôn chính xác mà không cần can thiệp thủ công.<h3>Thách thức: Nhiều phương thức thanh toán an toàn</h3><p>Thanh toán phải an toàn, chống gian lận.<p><strong>Giải pháp:</strong> Tích hợp PayOS QR và Thẻ siêu rẻ với mã hóa, kiểm tra checksum/HMAC, phát hiện gian lận.<h3>Thách thức: Khuyến mãi & mã giảm giá</h3><p>Chạy chương trình sale mà không bị lạm dụng mã giảm giá.<p><strong>Giải pháp:</strong> Xây dựng engine giảm giá với quy tắc (giới hạn lượt, mỗi người dùng 1 lần) để ngăn lạm dụng.<h3>Thách thức: Quản lý đại lý & hoa hồng</h3><p>Quản lý đại lý, doanh thu, hoa hồng mà không bị gian lận.<p><strong>Giải pháp:</strong> Xây dựng hệ thống quản lý đại lý riêng với log giao dịch đầy đủ và tính hoa hồng tự động.<h3>Thách thức: Hệ thống rút tiền cho đại lý</h3><p>Đại lý cần rút tiền nhanh mà vẫn đảm bảo an toàn cho nền tảng.<p><strong>Giải pháp:</strong> Quy trình rút tiền có duyệt admin, xác thực OTP/email (đại lý hợp lệ), log kiểm tra đầy đủ.<h3>Thách thức: Chat thời gian thực & hỗ trợ khách hàng</h3><p>Khách và đại lý cần trao đổi nhanh để giải quyết vấn đề.<p><strong>Giải pháp:</strong> Tích hợp chat SignalR thời gian thực với thông báo, hỗ trợ nhanh và tăng hài lòng khách hàng.<h3>Thách thức: Thông báo & theo dõi đơn hàng</h3><p>Người dùng, đại lý, admin cần nhận thông báo đơn hàng, thanh toán, cập nhật hệ thống tức thì.<p><strong>Giải pháp:</strong> Xây dựng hệ thống thông báo đa kênh (trong app, email, Telegram bot) với xử lý hàng đợi nền.<h3>Thách thức: Quản lý người dùng & admin</h3><p>Admin cần công cụ mạnh để giám sát và kiểm soát nền tảng.<p><strong>Giải pháp:</strong> Xây dựng dashboard admin với quản lý người dùng, chỉnh sửa ví, giám sát giao dịch, log hoạt động.<h3>Thách thức: Mở rộng & chống DDoS</h3><p>Hệ thống phải ổn định khi tăng người dùng và tránh downtime do tấn công.<p>Truy cập trực tiếp VPS lộ IP thật, dễ bị DDoS và tấn công.<p>Server bị giảm hiệu năng khi traffic cao do thiếu lọc truy cập.<p>Cloudflare cấu hình sai từng chặn nhầm người dùng hợp lệ.<p><strong>Giải pháp:</strong> Triển khai Cloudflare chống DDoS, hỗ trợ mở rộng ngang để chịu tải lớn. Bật Full Proxy Cloudflare để ẩn IP gốc server. Thiết lập Firewall/Page Rules Cloudflare chặn bot, giới hạn request, xác thực traffic nghi ngờ. Theo dõi traffic real-time qua Cloudflare analytics để tối ưu bảo vệ.<h3>Thách thức: Bảo trì dài hạn & cập nhật liên tục</h3><p>Nền tảng thay đổi theo nhu cầu người dùng, cần sửa lỗi và cập nhật thường xuyên.<p><strong>Giải pháp:</strong> Áp dụng quy trình agile, lấy phản hồi liên tục từ khách và đại lý, cập nhật tối ưu thường xuyên.</section><section><h2>Điểm nổi bật</h2><p><strong>Xử lý đơn hàng ổn định và chính xác</strong>: Thiết kế hệ thống đặt Robux xử lý từng đơn một với độ tin cậy cao. Mỗi giao dịch thực hiện tức thì, đảm bảo người dùng nhận Robux không chậm trễ hay lỗi.<p><strong>Đảm bảo giao dịch ví chính xác</strong>: Áp dụng hệ thống tự động cân bằng ví. Ngăn lỗi đồng thời bằng cách cô lập từng giao dịch, đảm bảo số dư ví luôn chính xác cho mọi người dùng.<p><strong>Mở rộng tới 1500+ người dùng với hiệu năng ổn định</strong>: Hệ thống vận hành tốt với hơn 1500 người dùng hoạt động, giữ ổn định giờ cao điểm nhờ tối ưu truy vấn DB và log giao dịch hiệu quả. Thiết kế sẵn sàng mở rộng khi nhu cầu tăng.<p><strong>Tự động hóa bảo hành & tranh chấp</strong>: Xây dựng hệ thống bảo hành tự động: người dùng báo đơn lỗi trong thời gian bảo hành, đại lý xử lý, nếu tranh chấp admin sẽ phân xử cuối cùng.<p><strong>Bảo mật cao với Cloudflare</strong>: Bảo vệ hệ thống bằng Cloudflare chống DDoS, ẩn IP server, đảm bảo hoạt động ổn định cho quy mô lớn.<p><strong>Thông báo đa kênh thời gian thực</strong>: Thông báo tự động qua web, email, Telegram cho mọi hành động quan trọng: đơn mới, xác nhận thanh toán, báo lỗi, cập nhật tranh chấp – giúp người dùng và đại lý luôn nắm thông tin.<p><strong>Hệ thống quản lý đại lý nâng cao</strong>: Cung cấp công cụ cho đại lý bán Robux, quản lý thành viên, xử lý báo lỗi, theo dõi hoa hồng minh bạch, hiệu quả.<p><strong>Tích hợp thanh toán đa tiền tệ mượt mà</strong>: Hỗ trợ nạp ví online VND & USD qua QR PayOS và các cổng khác, cập nhật số dư tự động, lịch sử giao dịch chi tiết.</section><section><h2>Thông tin dự án</h2><p>Danh mục: Ứng dụng web<p>Vai trò: Lập trình viên Full-Stack<p>Thời gian: Hơn 1 năm (Dự án dài hạn)<p>Quy mô: Dự án cá nhân<p>Công nghệ sử dụng: ASP.NET Core Razor Pages, ASP.NET Core API, Entity Framework Core, Html, Css, Js, SignalR, Google OAuth 2.0, JWT, SQL Server, Payos, Thẻ Siêu Rẻ, Cloudflare, Telegram API, Email SMTP, IIS<p>Thống kê nhanh: Dài hạn, 1500+ người dùng, 100% cá nhân, Bảo mật Cloudflare, JWT, SSL, Đa ngôn ngữ, Responsive, Đa thanh toán, Chat thời gian thực, Thông báo tự động, Ví cá nhân, Triển khai</section><section><h2>Dự án liên quan</h2><p><a href="/webs/fb-marketplace_vi.html">Chợ TK Facebook</a>: Website<p><a href="/webs/labroom.html">Hệ thống Quản lý Phòng máy</a>: Website</section><section><h2>Hình ảnh dự án</h2><ul><li><img alt="Ảnh trang đăng nhập"src="/imgs/robux_marketplace/login-page.webp"><li><img alt="Ảnh trang chủ"src="/imgs/robux_marketplace/homepage.webp"><li><img alt="Ảnh trang lịch sử đơn hàng"src="/imgs/robux_marketplace/history.webp"><li><img alt="Ảnh trang ví cá nhân"src="/imgs/robux_marketplace/balance.webp"><li><img alt="Ảnh cổng thanh toán Payos demo"src="/imgs/robux_marketplace/payos.webp"><li><img alt="Ảnh cổng thanh toán Thẻ Siêu Rẻ demo"src="/imgs/robux_marketplace/thes
