    <header><nav><a href="/index.html">Minh Ton</a> <a href="/projects.html">Projects</a> <a href="/services/game/index.html">Game Development Services</a></nav></header><main><section><h1>Similar Characters Online Game</h1><p>1 month | Solo Project | Completed<p>A real-time multiplayer experience featuring room-based matchmaking, ranking, duel mode, and live chat. Socket-based real-time systems, player data management, multi-round scoring logic, and delivering engaging interactive gameplay.</p><a href="/services/game/index.html">Contact to build a similar game</a></section><section><h2>Project Overview</h2><p>This is the project where I designed and implemented a real-time two-player multiplayer game using socket-based communication. The system supports room creation and matchmaking, real-time chat, player authentication, ranking, and friend management, delivering a smooth and interactive gameplay experience.<p>The duel mode introduces multi-round logic, timed turns, score accumulation, and fairness rules (including draw requests and timeout handling). These features showcase my capability to implement structured game mechanics and ensure consistent synchronization between two opponents in real-time.<p>In addition, I implemented persistent storage for player information and statistics, along with instant updates for chat and ranking. This required careful handling of game state, network events, and database consistency.<p>By working end-to-end on this project, I gained hands-on experience in socket programming (TCP), state synchronization, and multi-threaded server logic. The focus was primarily on building reliable real-time functionality and ensuring smooth gameplay flow, which highlights my technical expertise in developing interactive systems.</section><section><h2>Key Features</h2><ul><li>Room System<li>Realtime Duel Mode (2 players)<li>Memory Challenge Gameplay<li>Scoring System<li>Draw Mechanics<li>Player Data Storage<li>Leaderboard<li>Realtime Chat & Socials<li>Login/Logout & Account Management</ul></section><section><h2>Challenges & Solutions</h2><h3>Challenge: Realtime sync</h3><p>Synchronizing character sequences and player responses in real-time to ensure both opponents see the same sequence and results consistently over sockets.<p><strong>Solution:</strong> Implemented a server-authoritative design where the server generates sequences, broadcasts them, and validates player inputs. This prevents desyncs and ensures fair scoring by processing all results centrally before sending outcomes back to clients.<h3>Challenge: Scoring system</h3><p>Designing the scoring system to handle partial matches, streak bonuses, and draw negotiations while keeping rules fair and transparent.<p><strong>Solution:</strong> Built a flexible point-calculation module that checks characters sequentially, awards points by match length, tracks consecutive failures for forced draws, and integrates optional draw requests with both players’ confirmation.<h3>Challenge: Timer management</h3><p>Managing turn timers and ensuring players can’t exploit delays or timeouts during duels.<p><strong>Solution:</strong> Developed a countdown timer on the server side with strict limits: 10s to memorize, 60s to respond. Late or missing responses automatically result in losses or draws, enforced by server logic to eliminate client-side cheating.<h3>Challenge: Room system</h3><p>Implementing a reliable room system to ensure correct matchmaking and isolate data flow between different player duels.<p><strong>Solution:</strong> Built a socket-based lobby where players can create or join rooms. Each room is uniquely identified and maintains its own state, ensuring that only two players are paired together, with clean session management to prevent cross-room data leaks.<h3>Challenge: UI feedback</h3><p>Keeping the UI minimal yet responsive, providing instant feedback after each round without overwhelming the player.<p><strong>Solution:</strong> Implemented a simple Swing-based interface with dynamic text fields and result labels. Each round’s outcome is displayed immediately, while the sequence area auto-refreshes for the next challenge.</section><section><h2>Project Highlights</h2><p><strong>Realtime Duel Mode</strong>: Built a synchronous two-player battle system where moves, results, and timers are updated instantly using custom TCP socket communication.<p><strong>Custom Room System</strong>: Implemented a socket-based lobby where players can create, join, or quickly match into rooms, forming the foundation for real-time duels.<p><strong>Memory-based Scoring System</strong>: Implemented core game logic that generates sequences, validates guesses, tracks streaks, and awards points dynamically across 10 competitive rounds.<p><strong>Draw Negotiation Mechanic</strong>: Designed a strategic draw system where players can request and accept ties, adding depth to gameplay and decision-making under pressure.<p><strong>Persistent Player Data</strong>: Developed storage and tracking for match history, player scores, and performance stats, supporting long-term progress and fair play.<p><strong>Time-Limited Round System</strong>: Added countdowns for memory and input phases, ensuring balanced pacing and real challenge in every match.</section><section><h2>Project Info</h2><p>Category: Game 2D Application<p>My Role: Game Developer<p>Duration: 1 month<p>Team Size: Solo Project<p>Technologies: Java Swing, Realtime (TCP Socket), MySql<p>Core Implementations: Realtime Socket Communication, Room & Matchmaking System, Memory Challenge Game Logic, Scoring & Match Flow Control, Player Data Management, Leaderboard & Ranking System, Account System, Realtime Chat & Social Features, Simple UI for Gameplay<p>Game Rules:<ul><li><strong>Memory Phase</strong>: The server displays a character sequence for 10 seconds. After 5 seconds, a new sequence will be prepared for the next round.<li><strong>Input Phase</strong>: Each player has 60 seconds to enter the memorized sequence. The system checks how many characters are correct starting from the first character.<li><strong>Scoring</strong>: Points are awarded based on the number of correct characters and the difficulty (sequence length). If both players fail to guess correctly for 5 consecutive rounds, the match ends in a draw (each receives 0.5 points).<li><strong>Draw Option</strong>: A player may request a draw during a round. If the opponent agrees, the current round is skipped with no points awarded.<li><strong>Match End</strong>: Each match consists of 10 rounds. The player with the higher score wins. If tied, both players can start a new match. Completing a full 10-round match adds 1 match point to the player’s record.</ul><p>Quick Stats: Dev Time: 1 month, Type: Multiplayer Memory Game, Players: 2 (Realtime Duel), Networking: Custom TCP Socket, Rounds: 10 per Match, Features: 10+ Core Systems, Built By: 100% Solo</section><section><h2>Related Projects</h2><p><a href="/games/bleed_game.html">Bleed Game RPG</a>: Game Platformer 2D<p><a href="/games/chess2d.html">Chess 2D</a>: Game 2D</section><section><h2>Project Images</h2><ul><li><img alt="Screenshot play game with other"src="/imgs/similar_characters/play-game.webp"><li><img alt="Screenshot login form"src="/imgs/similar_characters/login-form.webp"><li><img alt="Screenshot ingame interface"src="/imgs/similar_characters/ingame.webp"><li><img alt="Screenshot create room"src="/imgs/similar_characters/create-room.webp"><li><img alt="Screenshot joining room"src="/imgs/similar_characters/join-room.webp"><li><img alt="Screenshot fast join room"src="/imgs/similar_characters/fast-join-room.webp"><li><img alt="Screenshot friend list"src="/imgs/similar_characters/friend-list.webp"><li><img alt="Screenshot duel friend"src="/imgs/similar_characters/duel-friend.webp"></ul></section></main><footer><h3>Tôn Thất Phu Nhật Minh</h3><nav><a href="/index.html">Home</a> <a href="/index.html#about">About</a> <a href="/index.html#skills">Skills</a> <a href="/projects.html">Projects</a> <a href="/index.html#contacts">Contacts</a></nav><p>Email: <a href="mailto:contact@minhton.dev">contact@minhton.dev</a><p>Phone: <a href="https://zalo.me/0915682176">+84 915682176</a><p>Location: <a href="https://maps.app.goo.gl/DMbT3amH4Zozn8jY9">Ho Chi Minh City, Việt Nam</a><p>Social: <a href="https://www.youtube.com/@IkuraIsCoding">YouTube</a> | <a href="https://www.facebook.com/TTPNMinh/">Facebook</a> | <a href="https://github.com/IkMinhTon">GitHub</a> | <a href="https://www.tiktok.com/@ikuraiscoding">TikTok</a><p>© June 17, 2025 Minh Ton – All Rights Reserved.</footer>
