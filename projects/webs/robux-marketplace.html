    <header><nav><a href="/index.html">Minh Ton</a> <a href="/projects.html">Projects</a> <a href="/services/web/index.html">Web Development Services</a></nav></header><main><section><h1>Robux Marketplace Website</h1><p>1+ years | Solo Project | Long-term Project<p>A full-featured web platform designed for buying, selling, and managing Robux transactions. The system supports multi-language, integrates real-time communication, and provides a secure wallet system with multiple payment methods. It ensures customer protection through automated warranty, refund handling, and detailed transaction tracking.</p><a href="/services/web/index.html">Contact to build a similar website</a></section><section><h2>Project Overview</h2><p>This project demonstrates the ability to design, build, and maintain a complex full-stack web system for online Robux trading. It covers the full development cycle, including authentication, secure transactions, real-time communication, wallet management, and multi-role access control.<p>Beyond just coding, the project simulates a real-world e-commerce platform with features such as multi-language support, agent management with commission tracking, automated notifications (email & Telegram), and a buyer protection system with automated warranty and refund handling.<p>What makes this project more valuable is that I not only handled the technical aspects but also interacted directly with users and clients over a long period of time to resolve issues, gather feedback, and continuously improve the product. This experience reflects the real challenges of maintaining a live system, ensuring customer satisfaction, and evolving the platform to meet growing needs.<p>By working solo on this long-term project, I gained hands-on experience in system architecture design, scalable database management, front-end development, back-end services, and deployment strategies. This showcases not only my technical expertise but also my ability to manage product growth, handle complex challenges, and deliver a professional-grade solution from scratch.</section><section><h2>Key Features</h2><ul><li>User authentication and authorization<li>Quick login with Google<li>Multi-language support<li>Buy Robux instantly, pre-order, or purchase small amounts<li>Personal wallet management with multi-currency support (VND, USD)<li>Secure online top-up with bank QR integration<li>Order/Transactions tracking, history, and detailed reporting<li>Real-time chat between users, agents, and admins<li>Agent management with commission-based sales<li>Withdrawal system for agents<li>Automated warranty and refund handling for failed orders<li>Admin tools for order approval, agent review, and fund adjustment<li>Automatic notifications via website, email, and Telegram<li>User data and profile management<li>Scalable performance tested with 1500+ users<li>Cloudflare integration for anti-DDoS and enhanced security<li>Responsive design across desktop, tablet, and mobile devices</ul></section><section><h2>Challenge & Solution</h2><h3>Challenge: Authentication & Authorization</h3><p>Ensuring account security and clear role-based access for users, agents, and admins.<p><strong>Solution:</strong> Implemented JWT with refresh tokens, role-based access control, and optional 2FA for enhanced security.<h3>Challenge: Multi-language Support</h3><p>Users from different regions require localized experiences.<p><strong>Solution:</strong> Built an languges system that allows easy addition and management of translations.<h3>Challenge: Flexible Order System (Instant Buy, Pre-order, Small-amount Purchase)</h3><p>Handling three different purchase flows without transaction conflicts.<p><strong>Solution:</strong> Designed a flexible order system with separate logic branches and queuing to prevent overselling.<h3>Challenge: Preventing Duplicate Orders</h3><p>When multiple users try to purchase at the same time, there is always a risk of duplicate sales — where two people accidentally buy the same account. This is a common concurrency problem in digital goods marketplaces.<p><strong>Solution: One-Account-One-Order Design</strong> To eliminate this risk, the system was designed so that each order corresponds to exactly one Roblox account. Once an account is purchased, it is instantly locked and marked as “sold,” making it unavailable for other users.<h3>Challenge: Order Tracking & History</h3><p>Users need real-time visibility into order progress.<p><strong>Solution:</strong> Developed an order tracking system with detailed status updates and searchable transaction history.<h3>Challenge: Personal Wallet with Multi-currency</h3><p>Supporting multiple currencies (VND, USD) while maintaining accurate balance tracking.<p><strong>Solution:</strong> Created dedicated personal wallets per user, applied standardized exchange rates depend on Admin, and logged every transaction in detail.<h3>Challenge: Wallet Balance Consistency</h3><p>Handling high-frequency balance updates automatically for multiple users at the same time can cause race conditions or inaccurate balances if not managed properly.<p><strong>Solution:</strong> Implemented an automated transaction system with strict concurrency control to ensure every operation is processed automatically. Each transaction is logged, verified, and synchronized, guaranteeing accurate and consistent wallet balances without manual intervention.<h3>Challenge: Multiple Payment Methods with Security</h3><p>Payments must be safe and fraud-proof.<p><strong>Solution:</strong> Integrated PayOS QR and The sieu re with encrypted data, checksum/HMAC verification, and fraud detection.<h3>Challenge: Promotions & Discount Codes</h3><p>Running sales campaigns without conflicts or abuse of discount codes.<p><strong>Solution:</strong> Created a discount engine with rules (usage limit, per-user restriction) to prevent misuse.<h3>Challenge: Agent Management & Commission Tracking</h3><p>Managing agents, their revenue, and commissions without abuse.<p><strong>Solution:</strong> Built a dedicated agent management system with full transaction logs and automated commission calculation.<h3>Challenge: Agent Withdrawal System</h3><p>Agents require fast withdrawals while ensuring platform safety.<p><strong>Solution:</strong> Implemented a withdrawal process with admin approval, OTP/email verification (valid agency), and complete audit logs.<h3>Challenge: Real-time Chat & Customer Support</h3><p>Customers and agents require quick communication to resolve issues.<p><strong>Solution:</strong> Integrated SignalR real-time chat system with notifications, ensuring faster support and higher satisfaction.<h3>Challenge: Notifications & Order Tracking</h3><p>Users, agents, admin must be notified of order, payment, and system updates instantly.<p><strong>Solution:</strong> Built a multi-channel notification system (in-app, email, Telegram bot) with background queue processing.<h3>Challenge: User & Admin Management</h3><p>Admins require strong tools to supervise and control the platform.<p><strong>Solution:</strong> Delivered an admin dashboard with user management, wallet editing, transaction monitoring, and activity logs.<h3>Challenge: Scalability & DDoS Protection</h3><p>The system must remain stable with growing user base and avoid downtime due to attacks.<p>Direct access to the VPS exposed its real IP address, making it vulnerable to DDoS attacks and other malicious traffic.<p>The server experienced performance drops during high traffic due to lack of traffic filtering.<p>Misconfigured Cloudflare rules initially caused false positives, blocking some legitimate users.<p><strong>Solution:</strong> Deployed with Cloudflare DDoS protection and horizontal scalability support for handling high traffic. Enabled Cloudflare’s Full Proxy mode to completely mask the origin server IP. Set up Firewall Rules and Page Rules in Cloudflare to block known bots, limit request rates, and challenge suspicious traffic. Monitored real-time traffic via Cloudflare analytics to fine-tune the protection.<h3>Challenge: Long-term Maintenance & Continuous Updates</h3><p>The platform evolves with user needs and requires fixes over time.<p><strong>Solution:</strong> Adopted agile iteration with continuous feedback from customers and agents, applying updates and optimizations regularly.</section><section><h2>Project Highlights</h2><p><strong>Delivered stable and accurate order processing</strong>: Designed the Robux order system to handle one-by-one transactions with high reliability. Each purchase is executed instantly, ensuring users receive their Robux without delays or errors.<p><strong>Ensured accurate wallet transactions</strong>: Implemented an automated balance system for wallet. Prevented race conditions by isolating transactions per request, ensuring consistent and precise wallet balances for all users.<p><strong>Scaled to 1500+ users with reliable performance</strong>: The system successfully handled over 1500 active users, maintaining stability during peak hours with optimized database queries and efficient transaction logging. Designed to grow smoothly as user demand increases.<p><strong>Automated warranty & dispute system</strong>: Developed an automated warranty system where users can report faulty orders within the warranty period. Agents must resolve the issue, and in case of disputes, admins intervene for final judgment.<p><strong>High-level security with Cloudflare</strong>: Protected the system with Cloudflare to mitigate DDoS attacks, mask server IP, and ensure availability for large-scale usage.<p><strong>Real-time multi-channel notifications</strong>: Implemented automatic notifications across in-app, email, and Telegram bot channels for every critical action — new orders, payment confirmation, reports, dispute updates — keeping users and agents always informed.<p><strong>Advanced agent management system</strong>: Provided agents with tools to sell Robux, manage members, handle reports, and track commissions, ensuring transparency and efficiency.<p><strong>Seamless multi-currency payment integration</strong>: Supported online wallet top-ups with VND & USD via QR PayOS and other gateways, with automated balance updates and detailed transaction history.</section><section><h2>Project Info</h2><p>Category: Web Application<p>My Role: Full-Stack Developer<p>Duration: 1+ years (Long-term Project)<p>Team Size: Solo Project<p>Technologies: ASP.NET Core Razor Pages, ASP.NET Core API, Entity Framework Core, Html, Css, Js, SignalR, Google OAuth 2.0, JWT, SQL Server, Payos, TheSieuRe, Cloudflare, Telegram API, Email SMTP, IIS<p>Quick Stats: Long-term project, 1500+ Users, Built By 100% Solo, Security with Cloudflare, JWT Authentication, SSL, Multiple Languages, Responsive, Multiple Payment, Chat Real-time, Automatic Notifications, Personal Wallet, Deployed</section><section><h2>Related Projects</h2><p><a href="/webs/fb-marketplace.html">Facebook Account Marketplace</a>: Website<p><a href="/webs/labroom.html">Academic Lab Management System</a>: Website</section><section><h2>Project Images</h2><ul><li><img alt="Screenshot login page"src="/imgs/robux_marketplace/login-page.webp"><li><img alt="Screenshot home page"src="/imgs/robux_marketplace/homepage.webp"><li><img alt="Screenshot history page"src="/imgs/robux_marketplace/history.webp"><li><img alt="Screenshot personal wallet page"src="/imgs/robux_marketplace/balance.webp"><li><img alt="Screenshot payment Payos demo"src="/imgs/robux_marketplace/payos.webp"><li><img alt="Screenshot payment The Sieu Re demo"src="/imgs/robux_marketplace/thesieure.webp"></ul></section></main><footer><h3>Tôn Thất Phu Nhật Minh</h3><nav><a href="/index.html">Home</a> <a href="/index.html#about">About</a> <a href="/index.html#skills">Skills</a> <a href="/projects.html">Projects</a> <a href="/index.html#contacts">Contacts</a></nav><p>Email: <a href="mailto:contact@minhton.dev">contact@minhton.dev</a><p>Phone: <a href="https://zalo.me/0915682176">+84 915682176</a><p>Location: <a href="https://maps.app.goo.gl/DMbT3amH4Zozn8jY9">Ho Chi Minh City, Việt Nam</a><p>Social: <a href="https://www.youtube.com/@IkuraIsCoding">YouTube</a> | <a href="https://www.facebook.com/TTPNMinh/">Facebook</a> | <a href="https://github.com/IkMinhTon">GitHub</a> | <a href="https://www.tiktok.com/@ikuraiscoding">TikTok</a><p>© June 17, 2025 Minh Ton – All Rights Reserved.</footer>
