<noscript>
    <header><nav><a href="/index_vi.html">Tôn Minh</a> <a href="/projects_vi.html">Dự án</a> <a href="/services/desktop/index_vi.html">Dịch vụ Phát triển Ứng dụng Desktop</a></nav></header><main><section><h1>MMDPlayer (Ứng dụng phát media)</h1><p>2–4 tuần | Dự án một người | Hoàn thành<p>Phát triển trình phát media desktop nhỏ bằng WinForms (C#), tích hợp thư viện AxWMPLib (Windows Media Player ActiveX) nhằm mang đến trải nghiệm phát video và âm thanh mượt mà, ổn định, với giao diện người dùng chuẩn Windows thân thiện và quen thuộc.</p><a href="https://github.com/IkMinhTon/MyWindowMedia">Xem dự án Github</a> <a href="/services/desktop/index_vi.html">Liên hệ để phát triển ứng dụng tương tự</a></section><section><h2>Tổng Quan Dự Án</h2><p>Đây là một trong những dự án cá nhân đầu tiên của tôi, được phát triển trong năm học đầu tiên tại trường. Ứng dụng đa phương tiện này được xây dựng hoàn toàn bằng C# và AxWMPLib (Windows Media Player ActiveX). Được thiết kế nhẹ nhưng mạnh mẽ, ứng dụng mang đến giải pháp phát media trên Windows với các tính năng phát cơ bản và giao diện thân thiện với người dùng.<p>Trình phát media này cho phép người dùng nghe nhạc, xem video, tổ chức nội dung qua các playlist tùy chỉnh, và điều khiển phát lại với các chức năng như tạm dừng/tiếp tục, phát ngẫu nhiên, lặp lại. Điểm nổi bật là hệ thống quản lý playlist mạnh mẽ, hỗ trợ nhiều playlist lưu trữ tập trung, mỗi playlist có thể chứa cả file âm thanh lẫn video.<p>Dự án này thể hiện hiểu biết của tôi về nguyên lý UI/UX desktop, lập trình sự kiện C#, và tích hợp ActiveX, là minh chứng cho cả kỹ năng kỹ thuật lẫn tư duy thiết kế phần mềm.</section><section><h2>Tính Năng Nổi Bật</h2><ul><li>Phát Nhạc & Video<li>Điều Khiển Phát Lại<li>Quản Lý Playlist<li>Nhập Playlist & Thư Viện Playlist<li>Giao Diện Thân Thiện</ul></section><section><h2>Thách Thức & Giải Pháp</h2><h3>Thách Thức: Xử lý âm thanh/hình ảnh phức tạp</h3><p>Xây dựng trình phát media từ đầu đòi hỏi xử lý phức tạp về giải mã và hiển thị âm thanh/hình ảnh.<p><strong>Giải Pháp:</strong> Tích hợp AxWMPLib (ActiveX Windows Media Player) để xử lý phát và điều khiển các chức năng như phát, tạm dừng, lặp lại, phát ngẫu nhiên—giúp tiết kiệm thời gian phát triển và đảm bảo tính ổn định, tương thích.<h3>Thách Thức: Quản lý playlist</h3><p>Thiết kế hệ thống playlist cho phép lưu cả âm thanh và video, đồng thời người dùng có thể xem, chỉnh sửa, quản lý dễ dàng.<p><strong>Giải Pháp:</strong> Xây dựng hệ thống quản lý playlist tùy chỉnh, hỗ trợ nhiều playlist, cho phép đổi tên, duyệt nội dung, quản lý đa dạng loại media trong từng danh sách.<h3>Thách Thức: Nhập đa định dạng</h3><p>Người dùng có nhiều định dạng file (.mp3, .mp4, .wav, v.v.) và cần trải nghiệm nhập file mượt mà.<p><strong>Giải Pháp:</strong> Tùy chỉnh bộ lọc OpenFileDialog cho phép chọn nhiều định dạng cùng lúc, hỗ trợ các định dạng phổ biến, tăng tiện lợi cho người dùng.<h3>Thách Thức: Giao diện treo</h3><p>WinForms chạy trên một luồng giao diện duy nhất, nếu không xử lý tốt sẽ dễ bị treo khi thao tác với file.<p><strong>Giải Pháp:</strong> Giữ các thao tác nhẹ nhàng, tối ưu tương tác giao diện, đảm bảo ứng dụng luôn mượt mà trong các trường hợp sử dụng thông thường. (Dự kiến cải tiến bất đồng bộ/đa luồng trong tương lai.)</section><section><h2>Điểm Nhấn Dự Án</h2><p><strong>Phát Âm Thanh & Video Đa Dạng</strong>: Phát mượt mà cả nhạc và video, hỗ trợ tạm dừng, tiếp tục, phát ngẫu nhiên và lặp lại.<p><strong>Hỗ Trợ Nhiều Định Dạng</strong>: Cho phép nhập và phát các định dạng: .mp3, .mp4, .wav, .webm, .weba, .wma, .mpa.<p><strong>Quản Lý Playlist Nâng Cao</strong>: Người dùng có thể tạo, chỉnh sửa, đổi tên, xóa nhiều playlist lưu trữ tập trung—mỗi playlist hỗ trợ cả nhạc và video.<p><strong>Nhập Playlist Ngoài</strong>: Hỗ trợ nhập playlist từ máy tính, giúp thiết lập nhanh và cá nhân hóa thư viện media.<p><strong>Giao Diện Thân Thiện</strong>: UI sạch sẽ, trực quan, dễ sử dụng và điều khiển media—phù hợp cả người mới lẫn người dùng nâng cao.<p><strong>Tích Hợp ActiveX (AxWMPLib)</strong>: Tích hợp thành phần Windows Media Player ActiveX cho trải nghiệm phát ổn định, chất lượng cao và nhẹ nhàng.</section><section><h2>Thông Tin Dự Án</h2><p>Thể Loại: Ứng dụng Desktop<p>Vai Trò: Nhà phát triển<p>Thời Gian: 2–4 tuần<p>Quy Mô: Dự án cá nhân<p>Công nghệ sử dụng: C#, Winform, AxWMPLib<p>Thống kê nhanh: Thời Gian Phát Triển: 2–4 tuần, Hỗ Trợ: .mp3, .mp4, .wav, v.v., Nền Tảng: Windows Desktop, Playlist: Hỗ trợ nhạc & video, Giao Diện: Tùy chỉnh, Dung Lượng Dự Án: Nhỏ</section><section><h2>Hình Ảnh Dự Án</h2><ul><li><img alt="Ảnh phát video"src="/imgs/mmd_player/video_view.webp"><li><img alt="Ảnh phát nhạc"src="/imgs/mmd_player/mmdplayer_ui.webp"><li><img alt="Ảnh mở nhạc 2"src="/imgs/mmd_player/mmdplayer_ui(1).webp"><li><img alt="Ảnh danh sách phát"src="/imgs/mmd_player/playlist.webp"><li><img alt="Ảnh danh sách phát 2"src="/imgs/mmd_player/playlist(1).webp"><li><img alt="Ảnh cập nhật danh sách phát"src="/imgs/mmd_player/playlist_update.webp"><li><img alt="Ảnh lịch sử phát"src="/imgs/mmd_player/history.webp"><li><img alt="Ảnh thư viện danh sách phát"src="/imgs/mmd_player/library.webp"></ul></section></main><footer><h3>Tôn Thất Phu Nhật Minh</h3><nav><a href="/index_vi.html">Trang chủ</a> <a href="/index_vi.html#about">Giới thiệu</a> <a href="/index_vi.html#skills">Kĩ năng thực chiến</a> <a href="/projects_vi.html">Dự án</a> <a href="/index_vi.html#contacts">Thông tin liên hệ</a></nav><p>Email: <a href="mailto:contact@minhton.dev">contact@minhton.dev</a><p>Phone: <a href="https://zalo.me/0915682176">+84 915682176</a><p>Location: <a href="https://maps.app.goo.gl/DMbT3amH4Zozn8jY9">TP Hồ Chí Minh, Việt Nam</a><p>Social: <a href="https://www.youtube.com/@IkuraIsCoding">YouTube</a> | <a href="https://www.facebook.com/TTPNMinh/">Facebook</a> | <a href="https://github.com/IkMinhTon">GitHub</a> | <a href="https://www.tiktok.com/@ikuraiscoding">TikTok</a><p>© 17 Tháng 6, 2025 Tôn Minh – Bảo lưu mọi quyền.</footer>
