, tối ưu cho quy trình thực tế của doanh nghiệp bạn.</section><section id="cases"><h2>Dự Án Tiêu Biểu</h2><p>Chứng minh năng lực qua các dự án thực tế<ul><li>AI Chatbot nội bộ<li>Hệ thống phân tích dữ liệu SSI<li>Phần mềm quản lý quán cà phê<li>Media player & quản lý nội dung<li>Ứng dụng chat nội bộ<li>Hệ thống đặt tour du lịch<li>Quản lý phòng lab</ul></section><section><h2>Bạn Có Thể Nhận Được Gì</h2><ul><li>Phân tích nghiệp vụ & Thiết kế hệ thống<li>Dashboard & Báo cáo tự động<li>Tích hợp thanh toán online<li>Kết nối API & Đồng bộ dữ liệu<li>Tích hợp thiết bị (máy in, barcode, cân...)<li>Tự động hóa quy trình<li>UI/UX chuyên nghiệp<li>Bảo mật & Phân quyền<li>Tài liệu đầy đủ & Bàn giao<li>Hỗ trợ sau triển khai</ul></section><section><h2>Quy Trình Làm Việc</h2><h3>Quy trình chuẩn (Waterfall)</h3><ol><li>Khám phá & Chiến lược<li>Thiết kế & Prototype<li>Phát triển<li>QA & Tối ưu<li>Triển khai & Hỗ trợ</ol><h3>Quy trình linh hoạt (Agile)</h3><p>Vòng lặp phản hồi liên tục, demo thường xuyên, dễ điều chỉnh theo thực tế.</section><section><h2>Gói Dịch Vụ</h2><p>Giá tham khảo (sẽ báo chính xác sau khi phân tích yêu cầu)<article><h3>Starter</h3><p>8 – 15 triệu VND<p>Công cụ quản lý nội bộ đơn giản, 1-2 tuần</article><article><h3>Business</h3><p>15 – 30 triệu VND<p>Hệ thống nhiều module, dashboard, 2-4 tuần</article><article><h3>Professional</h3><p>30 – 50 triệu VND<p>Phân tích nghiệp vụ sâu, tích hợp phức tạp, 4-8 tuần</article><article><h3>Custom Solution</h3><p>50 triệu+<p>Giải pháp toàn diện theo yêu cầu đặc thù</article></section><section><h2>Khách Hàng Nói Gì</h2><ul><li>“legit x1000, chạy siêu tốc!!” — Trí Đức Nguyễn<li>“Anh uy tín và nhiệt tình.” — Thành Trần Minh<li>“Bạn này uy tín chất lượng nha.” — Bùi Thị Ngọc An</ul></section><section><h2>Câu Hỏi Thường Gặp</h2><article><h3>Timeline dự án bao lâu?</h3><p>Từ 1-2 tuần (gói Starter) đến 8+ tuần (dự án phức tạp).</article><article><h3>Quyền sở hữu ứng dụng thuộc về ai?</h3><p>Sau khi thanh toán đầy đủ, bạn sở hữu source code và ứng dụng.</article></section><section id="contact"><h2>Sẵn Sàng Bắt Đầu?</h2><p>Liên hệ ngay để nhận tư vấn miễn phí.<p>Email: <a href="mailto:contact@minhton.dev">contact@minhton.dev</a><p>Zalo: <a href="https://zalo.me/0915682176">+84 915 682 176</a></section><footer><p>Tôn Thất Phu Nhật Minh — Lập Trình Viên Phần Mềm Full-stack<p>© 2025 Tôn Minh — Bảo lưu mọi quyền.</footer>
